baseURL = 'https://teimosodolinux.github.io/'
title = 'Teimoso do Linux'
theme = 'PaperMod'
defaultContentLanguage = 'pt'
defaultContentLanguageInSubdir = true

[services]
  [services.googleAnalytics]
    ID = "G-S2SWP0L7S2"

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ── IDIOMAS ────────────────────────────────────────────────
[languages.pt]
  label = "Português"
  contentDir = "content/pt"
  weight = 1
  languageName = "Português"

[[languages.pt.params.socialIcons]]
    name = "github"
    url = "https://github.com/teimosodolinux"

[[languages.pt.params.socialIcons]]
    name = "x"
    url = "https://x.com/teimosodolinux"
  
[[languages.pt.params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/teimosodolinux"

[[languages.pt.params.socialIcons]]
    name = "email"
    url = "mailto:teimosodolinux@gmail.com"

[[languages.pt.params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [languages.pt.params.homeInfoParams]
    Title = "Teimoso do Linux"
    Content = """
<div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 20px; text-align: left;">
    <img src="/images/Subgenius_Celus_512x512.webp" 
         style="width: 120px; height: 120px; border-radius: 50%; border: 0px solid #ccc; flex-shrink: 0;">
    <div style="flex: 1; min-width: 250px;">
        <strong>Marcelo "Linuxcelo" Souza</strong><br>
        Nerd jurássico da era DOS, apanhando do Open Source e perdendo a sanidade por uso excessivo do Xterm.
    </div>
</div>
"""

  [[languages.pt.menu.main]]
    name = "Arquivo"
    url = "archives/"
    weight = 1

  [[languages.pt.menu.main]]
    name = "Busca"
    url = "search/"
    weight = 2

  [[languages.pt.menu.main]]
    name = "Tags"
    url = "tags/"
    weight = 3

[languages.en]
  label = "English"
  contentDir = "content/en"
  weight = 2
  languageName = "English"

[[languages.en.params.socialIcons]]
    name = "github"
    url = "https://github.com/teimosodolinux"

[[languages.en.params.socialIcons]]
    name = "x"
    url = "https://x.com/teimosodolinux"

[[languages.en.params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/teimosodolinux"

[[languages.en.params.socialIcons]]
    name = "email"
    url = "mailto:teimosodolinux@gmail.com"

[[languages.en.params.socialIcons]]
    name = "rss"
    url = "/en/index.xml"

  [languages.en.params.homeInfoParams]
    Title = "Stubborn Linuxer"
    Content = """
<div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 20px; text-align: left;">
    <img src="/images/Subgenius_Celus_512x512.webp" 
         style="width: 120px; height: 120px; border-radius: 50%; border: 0px solid #ccc; flex-shrink: 0;">
    <div style="flex: 1; min-width: 250px;">
        <strong>Marcelo "Linuxcelo" Souza</strong><br>
        Jurassic nerd from the DOS era, getting beaten by Open Source and losing sanity from excessive Xterm usage.
    </div>
</div>
"""

  [[languages.en.menu.main]]
    name = "Archive"
    url = "/en/archives/"
    weight = 1

  [[languages.en.menu.main]]
    name = "Search"
    url = "/en/search/"
    weight = 2

  [[languages.en.menu.main]]
    name = "Tags"
    url = "/en/tags/"
    weight = 3

# ── PARAMS GLOBAIS ─────────────────────────────────────────
[params]
  ShowCodeCopyButtons = true
  favicon = "favicon.ico"
  comments = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  showTags = true

  [params.cover]
    linkFullImages = false
    responsiveImages = true

[privacy.x]
  disable = false
  enableDNT = true
  simple = false
