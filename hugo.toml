baseURL = 'https://teimosodolinux.github.io/'
locale = 'pt-br'
title = 'Teimoso do Linux'
theme = 'PaperMod'
defaultContentLanguage = 'pt'

[services]
  [services.googleAnalytics]
    ID = "G-S2SWP0L7S2"

[permalinks]
    posts = "/posts/:year/:month/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
    tag = "tags"
    category = "categories"

# 2. Ativar HTML para os comentários
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

defaultContentLanguage = "pt"

[languages.pt]
    label = "Português"
    contentDir = "content"
    weight = 1


[[menu.main]]
    name = "Arquivo"
    url = "/archives"
    weight = 1

[[menu.main]]
    name = "Busca"
    url = "/search"
    weight = 2

[[menu.main]]
    name = "Tags"
    url = "/tags"
    weight = 3


[params]

ShowCodeCopyButtons = true

favicon = "favicon.ico"

comments = true

[params.homeInfoParams]
    Title = "Teimoso do Linux"
    Content = """
<div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 20px; text-align: left;">
    <img src="/images/Subgenius_Celus_512x512.webp" 
         style="width: 120px; height: 120px; border-radius: 50%; border: 0px solid #ccc; flex-shrink: 0;">
    <div style="flex: 1; min-width: 250px;">
        <strong>Marcelo "Linuxcelo" Souza</strong><br>
        Dinossauro analógico da era DOS, apanhando do Open Source desde 2002 e perdendo a sanidade mental por uso excessivo do Xterm.
    </div>
</div>
"""

[privacy.x]
disable = false
enableDNT = true
simple = false


# Isso faz com que as tags apareçam no topo/rodapé dos posts
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowBreadCrumbs = true
# Mostra as tags abaixo do título do post
showTags = true

[params.cover]
linkFullImages = false
responsiveImages = true

[[params.socialIcons]]
name = "github"
url = "https://github.com/teimosodolinux"

[[params.socialIcons]]
name = "x"
url = "https://x.com/teimosodolinux"

[[params.socialIcons]]
name = "instagram"
url = "https://instagram.com/teimosodolinux"

[[params.socialIcons]]
name = "email"
url = "mailto:teimosodolinux@gmail.com"
